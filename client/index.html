<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Otro-Tema.app</title>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- LANDING -->

  <section id="landing">

    <h1 class="logo">
      <span class="logo-white">Otro-Tema</span><span class="logo-green">.app</span>
    </h1>

    <p class="subtitle">
      Pedí tu canción
    </p>

    <p class="click-text">
      Tocá cualquier lugar para continuar
    </p>

  </section>

  <!-- APP -->

  <main id="app">

    <div class="container">

      <header class="header">

        <h2>
          <span class="logo-white">Otro-Tema</span><span class="logo-green">.app</span>
        </h2>

        <p>
          Escaneaste el QR de
        </p>

        <p id="bar-name" class="bar-name">
          ⚓ BARLOVENTO ⚓
        </p>

      </header>

      <section class="search-card">

        <label class="search-label">
          Buscar canción
        </label>

        <div class="search-row">

          <input
            id="searchInput"
            type="text"
            placeholder="Nombre de canción o artista..."
          >

          <button id="btnSearch">
            Buscar
          </button>

        </div>

        <div id="resultados"></div>

      </section>

    </div>

  </main>

  <script src="cliente.js"></script>

</body>
</html>
